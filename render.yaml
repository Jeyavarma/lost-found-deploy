services:
  # Main Backend Service
  - type: web
    name: lost-found-backend
    env: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
    healthCheckPath: /api/health

  # Keep-Alive Cron Job (Prevents Cold Starts)
  - type: cron
    name: backend-keep-alive
    env: node
    schedule: "*/10 * * * *"  # Every 10 minutes
    buildCommand: echo "Keep-alive cron job"
    startCommand: curl -f https://lost-found-backend-u3bx.onrender.com/ || exit 0
